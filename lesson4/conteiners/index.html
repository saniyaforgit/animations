<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="logo">
            <img src="https://assets.turbologo.ru/blog/ru/2019/04/18164231/Aplle.png" alt="Логотип">
        </div>
        <div class="links">
            <a href="index.html">Главная</a>
            <a href="cart.html">Корзина</a>
        </div>
    </div>

    <div class="main">
        <h1>Корзина</h1>

        <div class="products">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2OzzNGcasuJA16WAMjOb-ndVL49q7t18IeQ&s" alt="Смартфон">

                    <h3>Смартфон X</h3>
                    <p>Мощный процессор и отличный экран.</p>
                    <div class="price">1 200 000 ₸</div>
                </div>

            <div class="card">
                <img src="https://images.deal.by/146083302_noutbuk-apple-macbook.jpg" alt="Ноутбук">
                <div class="card-content">
                    <h3>Ноутбук Y</h3>

                    <div class="price">899 990 ₸</div>
                </div>
            </div>

            <div class="card">
                <img src="https://prod-cdn.prod.asbis.io/s3size/el:t/rt:fill/w:512/plain/s3://cms/product/a4/ac/a4ac52016b34f19b7d204724429e896f/250612160029073899.webp" alt="Наушники">
                <div class="card-content">
                    <h3>Наушники Z</h3>
                    <p>Чистый звук и шумоподавление.</p>
                    <div class="price">149 990 ₸</div>
                </div>

        </div>
